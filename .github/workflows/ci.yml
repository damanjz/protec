name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - run: cargo fmt --all -- --check
      - run: cargo clippy -p protec-core --all-targets -- -D warnings
      - run: cargo test -p protec-core
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit
      - run: cargo audit
  gui:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run test
      - run: npm run build
      - run: cargo clippy -p protec-gui --all-targets -- -D warnings
      - run: cargo test -p protec-gui
      # Production bundle must use the Tauri CLI (NOT `cargo build`), which embeds
      # the frontend dist/ — a plain cargo build produces a binary that points at
      # the dev server (localhost) and cannot run standalone.
      - name: Cache tauri-cli
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-tauri.exe
          key: tauri-cli-v2-${{ runner.os }}
      - run: cargo install tauri-cli --version "^2" --locked
      - run: cargo tauri build
  host:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy -p protec-host --all-targets -- -D warnings
      - run: cargo test -p protec-host
      - run: cargo build -p protec-host --release
  ext:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run test
      - run: npm run build
