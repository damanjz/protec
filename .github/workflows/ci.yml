name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - run: cargo fmt --all -- --check
      - run: cargo clippy -p protec-core --all-targets -- -D warnings
      - run: cargo test -p protec-core
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit --version "^0.21" --locked
      - run: cargo audit
  gui:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm audit --omit=dev --audit-level=high
      - run: npm run test
      - run: npm run build
      - run: cargo clippy -p protec-gui --all-targets -- -D warnings
      - run: cargo test -p protec-gui
      # Production bundle must use the Tauri CLI (NOT `cargo build`), which embeds
      # the frontend dist/ — a plain cargo build produces a binary that points at
      # the dev server (localhost) and cannot run standalone.
      - name: Cache tauri-cli
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-tauri.exe
          key: tauri-cli-v2-${{ runner.os }}
      - run: cargo install tauri-cli --version "^2" --locked
      - run: cargo tauri build
  host:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy -p protec-host --all-targets -- -D warnings
      - run: cargo test -p protec-host
      - run: cargo build -p protec-host --release
  hello:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy -p protec-hello --all-targets -- -D warnings
      - run: cargo test -p protec-hello
      - run: cargo build -p protec-hello
  ext:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run test
      - run: npm run build
  # Experimental macOS build. Produces an UNSIGNED universal .dmg in the cloud
  # (no Apple Developer account). This proves the cross-platform code compiles and
  # bundles on a real macOS runner — it does NOT prove the app runs correctly, so
  # the artifact ships labeled experimental / community-tested.
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - run: cargo clippy -p protec-gui --all-targets -- -D warnings
      - run: cargo test -p protec-gui
      - run: cargo clippy -p protec-host --all-targets -- -D warnings
      - run: cargo test -p protec-host
      - run: cargo test -p protec-core
      - name: Cache tauri-cli
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-tauri
          key: tauri-cli-v2-${{ runner.os }}
      - run: cargo install tauri-cli --version "^2" --locked
      - name: Build unsigned universal .dmg
        run: cargo tauri build --target universal-apple-darwin
        env:
          APPLE_SIGNING_IDENTITY: ""
      - name: Upload macOS .dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: protec-macos-universal-dmg
          path: target/universal-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error